<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת פיקוח בניה PRO</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: var(--primary); }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* שעון וחיפוש */
        .timer-box { text-align: center; padding: 15px; border: 2px solid #eee; border-radius: 10px; margin-bottom: 20px; background: #fff; }
        #timerDisplay { font-size: 36px; font-weight: bold; color: var(--accent); display: block; }
        
        .search-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; background: #ebf2f7; padding: 15px; border-radius: 8px; }
        
        .btn { width: 100%; padding: 12px; font-size: 16px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin-top: 5px; }
        .btn-start { background: var(--success); color: white; }
        .btn-stop { background: var(--danger); color: white; display: none; }
        
        /* טבלה ותמונות */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: right; }
        .img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; cursor: pointer; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏗️ ניהול פיקוח בניה</h2>
    
    <div class="timer-box">
        <span id="timerDisplay">00:00:00</span>
        <button id="startBtn" class="btn btn-start" onclick="startWork()">התחל פיקוח באתר ▶️</button>
        <button id="stopBtn" class="btn btn-stop" onclick="openReportModal()">סיים ודווח ⏹️</button>
    </div>

    <div class="search-section">
        <input type="text" id="searchInput" placeholder="חפש פרויקט או הערה..." oninput="renderTable()">
        <input type="date" id="dateFilter" onchange="renderTable()">
    </div>

    <div class="table-container">
        <table id="logsTable">
            <thead>
                <tr>
                    <th>תאריך</th>
                    <th>פרויקט</th>
                    <th>שעות</th>
                    <th>תמונה</th>
                    <th>פעולות</th>
                </tr>
            </thead>
            <tbody id="logTableBody"></tbody>
        </table>
    </div>
    
    <button class="btn" style="background:#2c3e50; color:white; margin-top:20px;" onclick="exportToCSV()">הורד דוח אקסל (CSV) 📥</button>
</div>

<div id="reportModal" class="modal">
    <div class="modal-content">
        <h3>📝 סיכום ביקור</h3>
        <input type="text" id="projectName" placeholder="שם הפרויקט/אתר">
        <textarea id="workDone" rows="3" placeholder="מה בדקנו היום?"></textarea>
        <label>צרף תמונת ליקוי/ביצוע:</label>
        <input type="file" id="imageInput" accept="image/*" capture="environment">
        <button class="btn btn-start" onclick="saveWork()">שמור דיווח</button>
        <button class="btn" style="background:#95a5a6; color:white;" onclick="closeModal()">ביטול</button>
    </div>
</div>

<script>
    let logs = JSON.parse(localStorage.getItem('pro_supervision_logs')) || [];
    let startTime = localStorage.getItem('active_start');
    let timerInterval;

    function startWork() {
        startTime = new Date().toISOString();
        localStorage.setItem('active_start', startTime);
        uiStateRunning();
    }

    function uiStateRunning() {
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        timerInterval = setInterval(updateClock, 1000);
    }

    function updateClock() {
        const diff = new Date() - new Date(startTime);
        const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
        const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        document.getElementById('timerDisplay').innerText = `${h}:${m}:${s}`;
    }

    function openReportModal() { document.getElementById('reportModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('reportModal').style.display = 'none'; }

    async function saveWork() {
        const fileInput = document.getElementById('imageInput');
        let imageData = "";
        
        if (fileInput.files && fileInput.files[0]) {
            imageData = await toBase64(fileInput.files[0]);
        }

        const end = new Date();
        const start = new Date(startTime);
        
        const newEntry = {
            id: Date.now(),
            date: start.toISOString().split('T')[0],
            displayDate: start.toLocaleDateString('he-IL'),
            project: document.getElementById('projectName').value || "כללי",
            desc: document.getElementById('workDone').value || "",
            hours: ((end - start) / 3600000).toFixed(2),
            image: imageData
        };

        logs.push(newEntry);
        localStorage.setItem('pro_supervision_logs', JSON.stringify(logs));
        
        // Reset
        clearInterval(timerInterval);
        localStorage.removeItem('active_start');
        startTime = null;
        location.reload(); // רענון פשוט לעדכון הכל
    }

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    function renderTable() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const dateFilter = document.getElementById('dateFilter').value;
        const tbody = document.getElementById('logTableBody');
        tbody.innerHTML = '';

        logs.filter(log => {
            const matchesSearch = log.project.toLowerCase().includes(searchTerm) || log.desc.toLowerCase().includes(searchTerm);
            const matchesDate = !dateFilter || log.date === dateFilter;
            return matchesSearch && matchesDate;
        }).reverse().forEach(log => {
            tbody.innerHTML += `<tr>
                <td>${log.displayDate}</td>
                <td><strong>${log.project}</strong><br><small>${log.desc}</small></td>
                <td>${log.hours}</td>
                <td>${log.image ? `<img src="${log.image}" class="img-preview" onclick="window.open('${log.image}')">` : '-'}</td>
                <td><button onclick="deleteLog(${log.id})" style="color:red; background:none; border:none;">🗑️</button></td>
            </tr>`;
        });
    }

    function deleteLog(id) {
        if(confirm("למחוק דיווח זה?")) {
            logs = logs.filter(l => l.id !== id);
            localStorage.setItem('pro_supervision_logs', JSON.stringify(logs));
            renderTable();
        }
    }

    function exportToCSV() {
        let csv = "\uFEFFתאריך,פרויקט,תיאור,שעות\n";
        logs.forEach(l => { csv += `${l.displayDate},"${l.project}","${l.desc}",${l.hours}\n`; });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `דוח_פיקוח_בניה.csv`;
        link.click();
    }

    if (startTime) uiStateRunning();
    renderTable();
</script>
</body>
</html>
